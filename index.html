<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Estates | Exclusive Properties</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-visual"></div>
    
    <main class="container">
        <header class="fade-in">
            <h1>Elevate Your Living</h1>
            <p>Discover off-market opportunities and premium real estate tailored to your lifestyle.</p>
        </header>

        <section class="form-card fade-in">
            <div class="form-loader" id="loader">Loading Form...</div>
            <iframe 
                src="https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform?embedded=true" 
                width="100%" 
                height="800" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0"
                onload="document.getElementById('loader').style.display='none';">
                Loading…
            </iframe>
        </section>

        <footer>
            <p>&copy; 2026 Your Real Estate Brand. All rights reserved.</p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
